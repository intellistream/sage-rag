name: CI

on:
  push:
    branches: [main-dev]
  pull_request:
    branches: [main-dev]
  workflow_dispatch:

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff check
        run: ruff check .

      - name: Run tests
        run: pytest -v
